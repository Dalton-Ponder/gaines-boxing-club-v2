services:
  # Next.js Frontend
  website:
    # Uses the image built and published by your GitHub Actions workflow.
    # COOLIFY_BRANCH is injected automatically by Coolify into every docker compose
    # invocation, so no extra env var configuration is needed in the Coolify dashboard.
    # dev  -> ghcr.io/.../gaines-boxing-club-v2:dev
    # main -> ghcr.io/.../gaines-boxing-club-v2:main
    image: ghcr.io/dalton-ponder/gaines-boxing-club-v2:${COOLIFY_BRANCH:-latest}
    container_name: gaines-boxing-club-v2-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    networks:
      - coolify
      - db-network

networks:
  coolify:
    external: true
    name: coolify
  db-network:
    external: true
    name: db-network
